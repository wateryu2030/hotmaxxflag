<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>访问审批 - 好特卖运营看板</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 24px; }
    h1 { font-size: 1.35rem; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #334155; }
    th { background: #334155; color: #94a3b8; font-weight: 600; }
    .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; margin-right: 8px; }
    .btn-approve { background: #22c55e; color: #fff; }
    .btn-reject { background: #ef4444; color: #fff; }
    .btn:hover { opacity: 0.9; }
    .empty { color: #64748b; padding: 24px; text-align: center; }
    .err { color: #f87171; margin-top: 12px; }
  </style>
  <link rel="stylesheet" href="/static/css/mobile.css">
</head>
<body>
  <h1>企业外用户访问审批</h1>
  <p class="text-muted" style="margin-bottom:16px;">仅超级管理员可见。审批通过后，对应用户可登录访问 htma.greatagain.com.cn。<a href="/admin" style="color:#38bdf8;margin-left:8px;">返回管理员提醒页</a></p>
  <div class="table-responsive">
  <table>
    <thead><tr><th>姓名</th><th>open_id</th><th>申请时间</th><th>操作</th></tr></thead>
    <tbody id="list"></tbody>
  </table>
  </div>
  <p id="err" class="err" style="display:none;"></p>
  <script>
    (function(){
      function load(){
        fetch('/api/auth/approvals').then(function(r){ return r.json(); }).then(function(d){
          var tbody = document.getElementById('list');
          var err = document.getElementById('err');
          if (!d.success) { err.style.display='block'; err.textContent = d.message || '加载失败'; return; }
          var rows = d.pending || [];
          if (rows.length === 0) { tbody.innerHTML = '<tr><td colspan="4" class="empty">暂无待审批申请</td></tr>'; return; }
          tbody.innerHTML = rows.map(function(r){
            return '<tr><td>' + (r.name || '-') + '</td><td>' + (r.open_id || '') + '</td><td>' + (r.requested_at || '') + '</td><td>' +
              '<button class="btn btn-approve" data-open-id="' + (r.open_id||'') + '">通过</button>' +
              '<button class="btn btn-reject" data-open-id="' + (r.open_id||'') + '">拒绝</button></td></tr>';
          }).join('');
          tbody.querySelectorAll('.btn-approve').forEach(function(btn){
            btn.onclick = function(){ doApprove(this.dataset.openId, 'approve'); };
          });
          tbody.querySelectorAll('.btn-reject').forEach(function(btn){
            btn.onclick = function(){ doApprove(this.dataset.openId, 'reject'); };
          });
        }).catch(function(e){ document.getElementById('err').style.display='block'; document.getElementById('err').textContent = e.message || '请求失败'; });
      }
      function doApprove(openId, action){
        if (!openId) return;
        fetch('/api/auth/approve', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ open_id: openId, action: action }) })
          .then(function(r){ return r.json(); })
          .then(function(d){ if (d.success) load(); else alert(d.message || '操作失败'); })
          .catch(function(e){ alert(e.message || '请求失败'); });
      }
      load();
    })();
  </script>
</body>
</html>
